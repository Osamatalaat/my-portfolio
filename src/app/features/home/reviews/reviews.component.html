<section class="py-20 bg-gray-100" id="services">
  <div class="max-w-[1200px] mx-auto px-6 text-center relative">

    <!-- Title -->
    <div class="w-full text-center mb-8">
      <h2 class="text-3xl font-bold inline-block pb-2 border-b-4 border-red-500">
        Reviews
      </h2>
    </div>

    <!-- Mobile Layout -->
    <div *ngIf="isMobile" class="grid grid-cols-1 gap-6">
      <div
        *ngFor="let review of reviews"
        class="bg-white p-6 rounded-2xl shadow-lg cursor-pointer text-center"
      >
        <img
          [src]="review.image"
          alt=""
          class="w-20 h-20 rounded-full object-cover mx-auto mb-4 border-4 border-red-500"
        />

        <h3 class="text-lg font-semibold mb-1">
          {{ review.name }}
        </h3>

        <p *ngIf="review.role" class="text-sm text-gray-500 mb-2">
          {{ review.role }}
        </p>

        <!-- ⭐ Stars (Mobile FIXED) -->
        <div class="flex justify-center mb-3">
          <ng-container *ngFor="let star of getStars(review.rating)">
            <i *ngIf="star === 'full'" class="fas fa-star text-yellow-400"></i>
            <i *ngIf="star === 'half'" class="fas fa-star-half-alt text-yellow-400"></i>
            <i *ngIf="star === 'empty'" class="far fa-star text-yellow-400"></i>
          </ng-container>
        </div>

        <p class="text-gray-600 text-sm italic">
          "{{ review.comment }}"
        </p>
      </div>
    </div>

    <!-- Desktop Slider -->
    <div *ngIf="!isMobile" class="overflow-hidden">
      <div
        class="flex transition-transform duration-500 ease-in-out"
        [style.transform]="transformValue"
      >
        <div
          *ngFor="let review of reviews"
          class="w-1/3 flex-shrink-0 p-4 cursor-pointer"
        >
          <div class="bg-white p-6 rounded-2xl shadow-lg text-center">

            <img
              [src]="review.image"
              alt=""
              class="w-36 h-36 rounded-full object-cover mx-auto mb-4 border-4 border-red-500"
            />

            <h3 class="text-lg font-semibold">
              {{ review.name }}
            </h3>

            <p *ngIf="review.role" class="text-sm text-gray-500 mb-2">
              {{ review.role }}
            </p>

            <!-- ⭐ Stars -->
            <div class="flex justify-center mb-3">
              <ng-container *ngFor="let star of getStars(review.rating)">
                <i *ngIf="star === 'full'" class="fas fa-star text-yellow-400"></i>
                <i *ngIf="star === 'half'" class="fas fa-star-half-alt text-yellow-400"></i>
                <i *ngIf="star === 'empty'" class="far fa-star text-yellow-400"></i>
              </ng-container>
            </div>

            <p class="text-gray-600 text-sm italic">
              "{{ review.comment }}"
            </p>

          </div>
        </div>
      </div>
    </div>

  </div>
</section>
