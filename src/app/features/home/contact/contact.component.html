<section id="contact" class="bg-primary py-20">
  <div class="max-w-6xl mx-auto px-6">
    <!-- Title -->
    <div class="text-center mb-12">
      <h2
        class="text-3xl font-bold inline-block pb-2 border-b-4 border-red-500 text-white"
      >
        Contact Me
      </h2>
      <p class="text-gray-400 mt-4">
        Feel free to reach out if you want to work together 🚀
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-12 items-start">
      <!-- Contact Info -->
      <div class="space-y-6 text-gray-300">
        <p class="text-lg">
          If you have a project idea, collaboration opportunity, or just want to
          say hello — my inbox is always open.
        </p>

        <div class="flex flex-col gap-6">

  <!-- LinkedIn -->
  <a
    href="https://www.linkedin.com/in/osamatalaat/"
    target="_blank"
    class="flex items-center gap-4 hover:text-red-500 transition"
  >
    <i class="fab fa-linkedin text-3xl"></i>
    <span class="text-lg">LinkedIn</span>
  </a>

  <!-- GitHub -->
  <a
    href="https://github.com/Osamatalaat"
    target="_blank"
    class="flex items-center gap-4 hover:text-red-500 transition"
  >
    <i class="fab fa-github text-3xl"></i>
    <span class="text-lg">GitHub</span>
  </a>

  <!-- Gmail -->
  <a
    href="mailto:osamatalaat707&#64;gmail.com"
    target="_blank"
    class="flex items-center gap-4 hover:text-red-500 transition"
  >
    <i class="fas fa-envelope text-3xl"></i>
    <span class="text-lg">Email</span>
  </a>

  <!-- WhatsApp -->
  <a
    href="https://wa.me/201111048402"
    target="_blank"
    class="flex items-center gap-4 hover:text-red-500 transition"
  >
    <i class="fab fa-whatsapp text-3xl"></i>
    <span class="text-lg">WhatsApp</span>
  </a>

</div>
      </div>

      <!-- Contact Form -->
      <form class="space-y-6 bg-white p-8 rounded-xl shadow-xl">
        <!-- Name -->
        <div>
          <label class="block text-sm font-medium mb-2">Name</label>
          <input
            type="text"
            placeholder="Your Name"
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input
            type="email"
            placeholder="Your Email"
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>

        <!-- Message -->
        <div>
          <label class="block text-sm font-medium mb-2">Message</label>
          <textarea
            rows="4"
            placeholder="Your Message"
            class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500"
          ></textarea>
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-red-500 text-white py-3 rounded-lg hover:bg-red-600 transition cursor-pointer"
        >
          Send Message
        </button>
      </form>
    </div>
  </div>
</section>
