<nav class="py-6">
  <div class="max-w-7xl mx-auto px-6 py-4 bg-primary rounded-full relative">
    <!-- Container -->
    <div class="relative flex items-center justify-center">
      <!-- Desktop Menu (في النص) -->
      <ul class="hidden md:flex gap-8 items-center justify-center">
        <li *ngFor="let item of menuItems">
          <a
            [href]="item.link"
            (click)="setActive(item.name)"
            [ngClass]="{
              'text-red-500 font-bold text-xl': activeItem === item.name,
              'text-gray-400 hover:text-white': activeItem !== item.name,
            }"
            class="cursor-pointer"
          >
            {{ item.name }}
          </a>
        </li>
      </ul>

      <!-- ☰ Hamburger (يمين في الموبايل) -->
      <button
        class="md:hidden text-white text-2xl absolute right-6 cursor-pointer"
        (click)="toggleMenu()"
      >
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div
      class="absolute top-full left-0 w-full mt-4 bg-primary rounded-2xl shadow-lg py-6 md:hidden transition-all duration-300 z-20"
      [ngClass]="{
        'opacity-100 translate-y-0': isMenuOpen,
        'opacity-0 -translate-y-5 pointer-events-none': !isMenuOpen,
      }"
    >
      <ul class="flex flex-col items-center gap-6">
        <li *ngFor="let item of menuItems">
          <a
            [href]="item.link"
            (click)="setActive(item.name); toggleMenu()"
            [ngClass]="{
              'text-red-500 font-bold text-xl': activeItem === item.name,
              'text-gray-400 hover:text-white': activeItem !== item.name,
            }"
            class="cursor-pointer"
          >
            {{ item.name }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
